<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CoolTrack Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg: #f5f7fb;
      --bg-soft: #eef2f8;
      --white: #ffffff;
      --surface: #f8fafc;
      --surface-strong: #f1f5fb;
      --border: #dde4ee;
      --border-strong: #c8d3e2;

      --primary: #2459d3;
      --primary-strong: #1b45a7;
      --primary-soft: #ebf1ff;
      --secondary: #2f3f5c;

      --success: #0c9a6a;
      --success-soft: #e7faf2;
      --warning: #c97b0d;
      --warning-soft: #fff6e7;
      --danger: #d63c56;
      --danger-soft: #ffedf1;

      --blue: var(--primary);
      --blue-active: var(--primary-strong);
      --blue-tint: var(--primary-soft);
      --green: var(--success);
      --green-tint: var(--success-soft);
      --orange: var(--warning);
      --orange-tint: var(--warning-soft);
      --red: var(--danger);
      --red-tint: var(--danger-soft);

      --text: #172033;
      --text-muted: #3b4862;
      --muted: #64748c;
      --muted-light: #8798b3;

      --font-display: 'Outfit', sans-serif;
      --font-body: 'Outfit', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;

      --space-1: 4px;
      --space-2: 8px;
      --space-3: 12px;
      --space-4: 16px;
      --space-5: 24px;
      --space-6: 32px;

      --radius: 14px;
      --radius-sm: 10px;
      --shadow: 0 8px 24px rgba(28, 44, 76, 0.07);
      --shadow-lg: 0 16px 38px rgba(24, 38, 67, 0.14);

      --layout-max: 1360px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.45;
      background:
        radial-gradient(circle at 8% 8%, #f1f5ff 0%, transparent 38%),
        radial-gradient(circle at 92% 90%, #eaf1ff 0%, transparent 36%),
        var(--bg);
    }

    button { font-family: inherit; }
    textarea { resize: vertical; }

    #app {
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      position: sticky;
      top: 0;
      z-index: 80;
      background: rgba(248, 250, 253, 0.92);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.8), 0 6px 16px rgba(31, 44, 72, 0.04);
      padding: var(--space-4) 0;
    }

    .app-header__top,
    .header-stats {
      width: min(var(--layout-max), calc(100% - (var(--space-4) * 2)));
      margin-inline: auto;
    }

    .app-header__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
    }

    .app-logo {
      display: flex;
      align-items: baseline;
      gap: var(--space-1);
      color: var(--text);
      font-family: var(--font-display);
      font-size: clamp(1.1rem, 2vw, 1.35rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .app-logo__sub {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 500;
    }

    .app-header__date {
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.03em;
      text-transform: none;
    }

    .header-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-3);
    }

    .stat-pill {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow);
      text-align: left;
      padding: var(--space-3) var(--space-4);
    }

    .stat-pill__value {
      font-family: var(--font-display);
      color: var(--text);
      font-size: clamp(1.35rem, 2.6vw, 1.7rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .stat-pill__label {
      margin-top: var(--space-1);
      color: var(--muted);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0;
      text-transform: none;
    }

    .app-content {
      flex: 1;
      width: min(var(--layout-max), calc(100% - (var(--space-4) * 2)));
      margin: var(--space-4) auto 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .app-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 90;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      background: rgba(255, 255, 255, 0.96);
      border-top: 1px solid var(--border);
      box-shadow: 0 -8px 24px rgba(35, 49, 80, 0.12);
      padding-bottom: env(safe-area-inset-bottom);
    }

    .app-nav__title {
      display: none;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
    }

    .nav-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      color: var(--muted-light);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--space-1);
      position: relative;
      padding: 11px var(--space-1) 8px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0;
      text-transform: none;
      transition: color 0.18s ease, transform 0.18s ease;
    }

    .nav-btn__icon {
      font-size: 18px;
      transition: transform 0.18s ease;
    }

    .nav-btn:hover .nav-btn__icon {
      transform: translateY(-1px);
    }

    .nav-btn.is-active {
      color: var(--primary);
    }

    .nav-btn.is-active::after {
      content: '';
      position: absolute;
      top: 0;
      left: 22%;
      right: 22%;
      height: 3px;
      background: var(--primary);
      border-radius: 0 0 4px 4px;
    }

    .nav-btn__badge {
      display: none;
      position: absolute;
      top: 5px;
      right: calc(50% - 17px);
      width: 16px;
      height: 16px;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
      background: var(--danger);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      box-shadow: 0 0 0 2px #fff;
    }

    .nav-btn__badge.is-visible { display: flex; }

    main {
      flex: 1;
      min-width: 0;
      padding: 0 0 calc(92px + env(safe-area-inset-bottom));
      overflow: auto;
    }

    .view { display: none; }

    .view.active {
      display: block;
      animation: fade-up 0.24s ease;
    }

    @keyframes fade-up {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
      color: var(--text);
      font-family: var(--font-display);
      font-size: clamp(1.2rem, 2.2vw, 1.45rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .section-title--sm {
      font-size: clamp(1.03rem, 1.8vw, 1.16rem);
      margin-bottom: var(--space-2);
      color: var(--secondary);
    }

    .page-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-3);
      margin-bottom: var(--space-3);
      flex-wrap: wrap;
    }

    .page-toolbar__actions {
      display: flex;
      gap: var(--space-2);
      flex-wrap: wrap;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
    }

    #dash-alertas-mini,
    #dash-recentes,
    #dash-criticos,
    #lista-equip,
    #lista-alertas {
      display: grid;
      gap: var(--space-3);
    }

    .recent-card {
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .recent-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 30px rgba(31, 48, 81, 0.12);
    }

    .recent-card__date {
      color: var(--muted-light);
      font-family: var(--font-mono);
      font-size: 10px;
      margin-bottom: var(--space-1);
    }

    .recent-card__title {
      color: var(--text);
      font-size: 15px;
      font-weight: 700;
      margin-bottom: var(--space-1);
    }

    .recent-card__equip {
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      margin-bottom: var(--space-1);
    }

    .recent-card__obs {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .equip-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-left: 4px solid var(--border-strong);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-4);
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .equip-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(31, 48, 81, 0.12);
    }

    .equip-card--ok { border-left-color: var(--success); }
    .equip-card--warn { border-left-color: var(--warning); }
    .equip-card--danger { border-left-color: var(--danger); }

    .equip-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      flex-shrink: 0;
    }

    .equip-card--ok .equip-card__icon { background: var(--success-soft); }
    .equip-card--warn .equip-card__icon { background: var(--warning-soft); }
    .equip-card--danger .equip-card__icon { background: var(--danger-soft); }

    .equip-card__body {
      flex: 1;
      min-width: 0;
    }

    .equip-card__name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .equip-card__local {
      margin-top: var(--space-1);
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font-mono);
    }

    .equip-card__tag {
      margin-top: var(--space-1);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
    }

    .equip-card__last {
      margin-top: var(--space-1);
      color: var(--muted-light);
      font-size: 11px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 999px;
      padding: 4px 10px;
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: none;
    }

    .badge--ok { background: var(--success-soft); color: var(--success); }
    .badge--warn { background: var(--warning-soft); color: var(--warning); }
    .badge--danger { background: var(--danger-soft); color: var(--danger); }

    .form-group { margin-bottom: var(--space-3); }

    .form-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-3);
    }

    .form-label {
      display: block;
      margin-bottom: var(--space-1);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      text-transform: none;
      letter-spacing: 0;
    }

    .form-control {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      padding: 11px 13px;
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      appearance: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    .form-control:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(36, 89, 211, 0.12);
    }

    textarea.form-control {
      min-height: 96px;
      line-height: 1.45;
    }

    .photo-drop {
      position: relative;
      border: 2px dashed var(--border-strong);
      border-radius: var(--radius-sm);
      background: var(--surface);
      text-align: center;
      padding: var(--space-5) var(--space-4);
      cursor: pointer;
      transition: border-color 0.18s ease, background-color 0.18s ease;
    }

    .photo-drop:hover {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .photo-drop input[type='file'] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .photo-drop__icon {
      font-size: 28px;
      margin-bottom: var(--space-1);
    }

    .photo-drop__text {
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: var(--space-2);
      margin-top: var(--space-2);
    }

    .photo-thumb {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--border);
    }

    .photo-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-thumb__remove {
      position: absolute;
      top: 5px;
      right: 5px;
      width: 23px;
      height: 23px;
      border: none;
      border-radius: 50%;
      background: rgba(20, 29, 47, 0.72);
      color: #fff;
      cursor: pointer;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .btn {
      width: 100%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: 12px 16px;
      border-radius: 11px;
      border: 1px solid transparent;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.15s ease, color 0.15s ease;
    }

    .btn:active { transform: translateY(1px); }

    .btn--primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 10px 20px rgba(36, 89, 211, 0.22);
    }

    .btn--primary:hover {
      background: var(--primary-strong);
    }

    .btn--outline {
      background: #fff;
      color: var(--secondary);
      border-color: var(--border-strong);
    }

    .btn--outline:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-soft);
    }

    .btn--danger {
      background: var(--danger-soft);
      color: var(--danger);
      border-color: #f8ccd5;
    }

    .btn--danger:hover {
      background: #ffe4ea;
    }

    .btn--sm {
      width: auto;
      min-height: 0;
      padding: 9px 14px;
      font-size: 12px;
      border-radius: 10px;
    }

    .btn-group {
      margin-top: var(--space-3);
      display: flex;
      gap: var(--space-3);
      flex-wrap: wrap;
    }

    .btn-group .btn {
      flex: 1;
      min-width: 130px;
    }

    .timeline {
      position: relative;
      padding-left: 24px;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .timeline__item {
      position: relative;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--space-4);
      margin-bottom: var(--space-3);
    }

    .timeline__item-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-2);
    }

    .timeline__item-body { flex: 1; min-width: 0; }

    .timeline__dot {
      position: absolute;
      left: -21px;
      top: 18px;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--primary);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px var(--primary);
    }

    .timeline__dot--warn { background: var(--warning); box-shadow: 0 0 0 2px var(--warning); }
    .timeline__dot--danger { background: var(--danger); box-shadow: 0 0 0 2px var(--danger); }

    .timeline__date {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--muted-light);
      margin-bottom: var(--space-1);
    }

    .timeline__title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: var(--space-1);
    }

    .timeline__equip {
      margin-bottom: var(--space-2);
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
    }

    .timeline__obs {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .timeline__parts {
      margin-top: var(--space-2);
      color: var(--muted);
      font-size: 12px;
    }

    .timeline__next {
      display: inline-flex;
      margin-top: var(--space-2);
      padding: 4px 8px;
      border-radius: 8px;
      background: var(--warning-soft);
      color: var(--warning);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
    }

    .timeline__delete {
      border: none;
      background: transparent;
      color: var(--muted-light);
      font-size: 16px;
      cursor: pointer;
      padding: var(--space-1);
      margin-left: var(--space-2);
      flex-shrink: 0;
    }

    .timeline__delete:hover { color: var(--danger); }

    .alert-card {
      background: #fffdf9;
      border: 1px solid #f1ddbc;
      border-left: 5px solid var(--warning);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: var(--space-4);
      display: flex;
      gap: var(--space-3);
      align-items: flex-start;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease;
    }

    .alert-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(34, 46, 74, 0.12);
    }

    .alert-card--critical {
      background: #fff8fa;
      border-color: #f5c8d2;
      border-left-color: var(--danger);
    }

    .alert-card__icon {
      font-size: 21px;
      line-height: 1;
      flex-shrink: 0;
    }

    .alert-card__title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .alert-card__sub {
      margin-top: var(--space-1);
      color: var(--muted);
      font-size: 12px;
    }

    .alert-card__equip {
      margin-top: var(--space-2);
      color: var(--primary);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(17, 26, 42, 0.44);
      backdrop-filter: blur(4px);
      align-items: flex-end;
      justify-content: center;
    }

    .modal-overlay.is-open {
      display: flex;
      animation: fade-in 0.2s ease;
    }

    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal {
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      background: var(--white);
      border-radius: 18px 18px 0 0;
      padding: var(--space-5) var(--space-4) var(--space-6);
      animation: slide-up 0.23s ease;
    }

    @keyframes slide-up {
      from { transform: translateY(36px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .modal__handle {
      width: 40px;
      height: 4px;
      border-radius: 999px;
      background: var(--border);
      margin: 0 auto var(--space-4);
    }

    .modal__title {
      margin-bottom: var(--space-4);
      color: var(--text);
      font-family: var(--font-display);
      font-size: clamp(1.25rem, 2vw, 1.5rem);
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }

    .eq-modal-summary {
      margin: var(--space-2) 0 var(--space-3);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 600;
    }

    .eq-modal-quick {
      margin-bottom: var(--space-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 10px 12px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .search-bar {
      position: relative;
      margin-bottom: var(--space-3);
    }

    .search-bar__input { padding-left: 38px !important; }

    .search-bar__icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-light);
      font-size: 16px;
      pointer-events: none;
    }

    .info-list { margin-bottom: var(--space-3); }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: var(--space-2);
      border-bottom: 1px solid var(--border);
      padding: 9px 0;
      font-size: 13px;
    }

    .info-row:last-child { border-bottom: none; }

    .info-row__label {
      color: var(--muted);
      font-size: 12px;
    }

    .info-row__value {
      max-width: 62%;
      text-align: right;
      font-weight: 600;
    }

    .empty-state {
      border: 1px dashed var(--border-strong);
      border-radius: var(--radius);
      background: var(--surface);
      text-align: center;
      padding: var(--space-6) var(--space-5);
    }

    .empty-state__icon {
      font-size: 36px;
      opacity: 0.62;
      margin-bottom: var(--space-2);
    }

    .empty-state__title {
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 700;
    }

    .empty-state__sub {
      margin-top: var(--space-1);
      color: var(--muted);
      font-size: 12px;
    }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(9, 12, 18, 0.9);
      align-items: center;
      justify-content: center;
    }

    .lightbox.is-open { display: flex; }

    .lightbox__img {
      max-width: 95vw;
      max-height: 90vh;
      border-radius: 10px;
      object-fit: contain;
    }

    .lightbox__close {
      position: absolute;
      top: 16px;
      right: 20px;
      border: none;
      background: none;
      color: #fff;
      cursor: pointer;
      font-size: 30px;
    }

    .report-header {
      margin-bottom: var(--space-2);
      padding-bottom: var(--space-2);
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .report-meta {
      color: var(--muted);
      font-size: 12px;
      font-family: var(--font-mono);
      line-height: 1.4;
    }

    .report-record { page-break-inside: avoid; }

    .report-record__head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--space-2);
      margin-bottom: var(--space-2);
    }

    .report-record__title {
      font-size: 15px;
      font-weight: 700;
      margin-bottom: var(--space-1);
    }

    .report-record__date {
      color: var(--muted-light);
      font-family: var(--font-mono);
      font-size: 11px;
    }

    .report-record__obs {
      margin-top: var(--space-2);
      border-radius: var(--radius-sm);
      background: var(--surface);
      padding: 10px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .report-next {
      display: inline-flex;
      margin-top: var(--space-2);
      border-radius: 8px;
      background: var(--warning-soft);
      color: var(--warning);
      padding: 4px 8px;
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 600;
    }

    @media (min-width: 640px) and (max-width: 1024px) {
      .app-header { padding: var(--space-4) 0; }

      .app-header__top,
      .header-stats,
      .app-content {
        width: min(var(--layout-max), calc(100% - (var(--space-5) * 2)));
      }

      .form-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #dash-recentes,
      #dash-criticos,
      #lista-equip,
      #lista-alertas {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (min-width: 1025px) {
      .app-header {
        padding: var(--space-4) 0;
      }

      .app-header__top,
      .header-stats,
      .app-content {
        width: min(var(--layout-max), calc(100% - (var(--space-6) * 2)));
      }

      .app-content {
        margin-top: var(--space-5);
        margin-bottom: var(--space-5);
        display: grid;
        grid-template-columns: 250px minmax(0, 1fr);
        gap: var(--space-5);
        align-items: start;
      }

      .app-nav {
        position: sticky;
        top: 92px;
        left: auto;
        right: auto;
        bottom: auto;
        height: calc(100vh - 122px);
        overflow: auto;
        display: flex;
        flex-direction: column;
        gap: var(--space-1);
        padding: var(--space-3);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--white);
        box-shadow: var(--shadow);
      }

      .app-nav__title {
        display: block;
        margin: 2px 6px var(--space-2);
      }

      .nav-btn {
        flex-direction: row;
        justify-content: flex-start;
        gap: var(--space-2);
        padding: 10px 10px;
        border-radius: 10px;
        font-size: 13px;
      }

      .nav-btn__icon { font-size: 17px; }

      .nav-btn.is-active {
        background: var(--primary-soft);
      }

      .nav-btn.is-active::after {
        display: none;
      }

      .nav-btn__badge {
        top: 8px;
        right: 8px;
      }

      main {
        padding: 0;
      }

      .view.active {
        min-height: calc(100vh - 200px);
      }

      .form-row {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #dash-alertas-mini {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      #dash-recentes,
      #dash-criticos {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      #lista-equip,
      #lista-alertas {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .modal-overlay {
        align-items: center;
        padding: var(--space-5);
      }

      .modal {
        width: min(820px, 100%);
        border-radius: 16px;
        padding: var(--space-5);
        box-shadow: var(--shadow-lg);
      }

      .modal__handle {
        display: none;
      }
    }

    @media print {
      .app-header,
      .app-nav,
      .page-toolbar,
      .btn-group,
      .modal-overlay {
        display: none !important;
      }

      body {
        background: #fff;
      }

      #app {
        width: 100%;
      }

      .app-content {
        display: block;
        width: 100%;
        margin: 0;
      }

      main {
        padding: 0;
      }

      .view {
        display: none !important;
      }

      #view-relatorio {
        display: block !important;
      }
    }

  </style>
</head>

<!-- ============================================================
     HTML
============================================================ -->
<body>
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="app-header__top">
      <div class="app-logo">CoolTrack <span class="app-logo__sub">Pro</span></div>
      <div class="app-header__date" id="hdr-date"></div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">
        <div class="stat-pill__value" id="hst-total">0</div>
        <div class="stat-pill__label">Equipamentos</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill__value" id="hst-mes">0</div>
        <div class="stat-pill__label">Este mês</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill__value" id="hst-alert">0</div>
        <div class="stat-pill__label">Alertas</div>
      </div>
    </div>
  </header>

  <!-- Bottom Nav -->
  <div class="app-content">
  <nav class="app-nav" aria-label="Navegação principal">
    <div class="app-nav__title">Painel Operacional</div>
    <button class="nav-btn is-active" id="nav-inicio"       onclick="goView('inicio')">
      <span class="nav-btn__icon">🏠</span>Início
    </button>
    <button class="nav-btn" id="nav-equipamentos"           onclick="goView('equipamentos')">
      <span class="nav-btn__icon">❄️</span>Equip.
    </button>
    <button class="nav-btn" id="nav-registro"               onclick="goView('registro')">
      <span class="nav-btn__icon">➕</span>Registrar
    </button>
    <button class="nav-btn" id="nav-historico"              onclick="goView('historico')">
      <span class="nav-btn__icon">📋</span>Histórico
    </button>
    <button class="nav-btn" id="nav-alertas"                onclick="goView('alertas')">
      <span class="nav-btn__icon">🔔</span>Alertas
      <span class="nav-btn__badge" id="alerta-badge">0</span>
    </button>
  </nav>

  <main>

    <!-- ── INÍCIO ── -->
    <div class="view active" id="view-inicio">
      <div class="section-title">👋 Bom dia!</div>
      <div id="dash-alertas-mini"></div>

      <div class="section-title section-title--sm">Últimas manutenções</div>
      <div id="dash-recentes"></div>

      <div class="section-title section-title--sm">Equipamentos críticos</div>
      <div id="dash-criticos"></div>
    </div>

    <!-- ── EQUIPAMENTOS ── -->
    <div class="view" id="view-equipamentos">
      <div class="page-toolbar">
        <div class="section-title" style="margin:0">❄️ Equipamentos</div>
        <button class="btn btn--primary btn--sm" onclick="openModal('modal-add-eq')">+ Adicionar</button>
      </div>
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input class="form-control search-bar__input" type="text" placeholder="Buscar equipamento..." oninput="renderEquip(this.value)">
      </div>
      <div id="lista-equip"></div>
    </div>

    <!-- ── NOVO REGISTRO ── -->
    <div class="view" id="view-registro">
      <div class="section-title">✏️ Novo Registro</div>
      <div class="card">

        <div class="form-group">
          <label class="form-label">Equipamento *</label>
          <select id="r-equip" class="form-control">
            <option value="">Selecione...</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Data e Hora *</label>
          <input id="r-data" class="form-control" type="datetime-local">
        </div>

        <div class="form-group">
          <label class="form-label">Tipo de Serviço *</label>
          <select id="r-tipo" class="form-control">
            <option value="">Selecione...</option>
            <option>Manutenção Preventiva</option>
            <option>Manutenção Corretiva</option>
            <option>Limpeza de Filtros</option>
            <option>Carga de Gás Refrigerante</option>
            <option>Troca de Compressor</option>
            <option>Troca de Capacitor</option>
            <option>Limpeza de Condensador</option>
            <option>Limpeza de Evaporador</option>
            <option>Verificação Elétrica</option>
            <option>Ajuste de Dreno</option>
            <option>Inspeção Geral</option>
            <option>Outro</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Peças / Materiais utilizados</label>
          <input id="r-pecas" class="form-control" type="text" placeholder="Ex: Filtro G4, R-410A 1kg, Capacitor 30µF">
        </div>

        <div class="form-group">
          <label class="form-label">Observações / Serviço Realizado *</label>
          <textarea id="r-obs" class="form-control" placeholder="Descreva o que foi feito, valores medidos, condições encontradas..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Fotos do Serviço</label>
          <div class="photo-drop">
            <input type="file" accept="image/*" multiple onchange="Photos.add(this)">
            <div class="photo-drop__icon">📷</div>
            <div class="photo-drop__text">Toque para adicionar fotos</div>
          </div>
          <div class="photo-grid" id="photo-preview"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Próxima Manutenção Prevista</label>
            <input id="r-proxima" class="form-control" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">Status do Equipamento</label>
            <select id="r-status" class="form-control">
              <option value="ok">✅ Operando Normal</option>
              <option value="warn">⚠️ Requer Atenção</option>
              <option value="danger">🔴 Fora de Operação</option>
            </select>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn--outline" onclick="Registro.clear()">Limpar</button>
          <button class="btn btn--primary" onclick="Registro.save()">💾 Salvar</button>
        </div>
      </div>
    </div>

    <!-- ── HISTÓRICO ── -->
    <div class="view" id="view-historico">
      <div class="page-toolbar">
        <div class="section-title" style="margin:0">📋 Histórico</div>
        <button class="btn btn--outline btn--sm" onclick="goView('relatorio')">📄 Relatório</button>
      </div>
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input class="form-control search-bar__input" id="hist-busca" type="text" placeholder="Buscar no histórico..." oninput="renderHist()">
      </div>
      <div class="form-group">
        <select id="hist-equip" class="form-control" onchange="renderHist()">
          <option value="">Todos os equipamentos</option>
        </select>
      </div>
      <div id="timeline"></div>
    </div>

    <!-- ── ALERTAS ── -->
    <div class="view" id="view-alertas">
      <div class="section-title">🔔 Alertas</div>
      <div id="lista-alertas"></div>
    </div>

    <!-- ── RELATÓRIO ── -->
    <div class="view" id="view-relatorio">
      <div class="page-toolbar">
        <div class="section-title" style="margin:0">📄 Relatório</div>
        <div class="page-toolbar__actions">
          <button class="btn btn--outline btn--sm" onclick="goView('historico')">← Voltar</button>
          <button class="btn btn--primary btn--sm" id="print-btn" onclick="window.print()">🖨️ Imprimir</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Equipamento</label>
        <select id="rel-equip" class="form-control" onchange="renderRelatorio()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">De</label>
          <input id="rel-de" class="form-control" type="date" onchange="renderRelatorio()">
        </div>
        <div class="form-group">
          <label class="form-label">Até</label>
          <input id="rel-ate" class="form-control" type="date" onchange="renderRelatorio()">
        </div>
      </div>
      <div id="relatorio-corpo"></div>
    </div>

  </main>
</div>
</div><!-- /#app -->

<!-- Modal: Adicionar Equipamento -->
<div class="modal-overlay" id="modal-add-eq">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__title">Novo Equipamento</div>

    <div class="form-group">
      <label class="form-label">Nome *</label>
      <input id="eq-nome" class="form-control" type="text" placeholder="Ex: Split UTI Adulto">
    </div>
    <div class="form-group">
      <label class="form-label">TAG / Identificação</label>
      <input id="eq-tag" class="form-control" type="text" placeholder="Ex: AC-UTI-01">
    </div>
    <div class="form-group">
      <label class="form-label">Localização *</label>
      <input id="eq-local" class="form-control" type="text" placeholder="Ex: UTI Adulto – 2º Andar">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select id="eq-tipo" class="form-control">
          <option>Split Hi-Wall</option>
          <option>Split Cassete</option>
          <option>Split Piso Teto</option>
          <option>VRF / VRV</option>
          <option>Chiller</option>
          <option>Fan Coil</option>
          <option>Self Contained</option>
          <option>Roof Top</option>
          <option>Câmara Fria</option>
          <option>Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fluido Refrigerante</label>
        <select id="eq-fluido" class="form-control">
          <option>R-410A</option>
          <option>R-22</option>
          <option>R-32</option>
          <option>R-407C</option>
          <option>R-134A</option>
          <option>Outro</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Marca / Modelo</label>
      <input id="eq-modelo" class="form-control" type="text" placeholder="Ex: Carrier 18000 BTU">
    </div>
    <div class="btn-group">
      <button class="btn btn--outline" onclick="Modal.close('modal-add-eq')">Cancelar</button>
      <button class="btn btn--primary" onclick="Equipamentos.save()">✅ Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Detalhe Equipamento -->
<div class="modal-overlay" id="modal-eq-det">
  <div class="modal">
    <div class="modal__handle"></div>
    <div id="eq-det-corpo"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="Photos.closeLightbox()">
  <button class="lightbox__close" onclick="Photos.closeLightbox()">✕</button>
  <img class="lightbox__img" id="lightbox-img" src="" alt="Foto do serviço">
</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script>
  (function () {
    const params = new URLSearchParams(window.location.search);
    if (!params.has('p')) return;
    history.replaceState(null, '', `${window.location.pathname}${window.location.hash || ''}`);
  })();
</script>
<script type="module" src="./hvca/js/app.js"></script>

</body>
</html>
