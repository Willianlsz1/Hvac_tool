<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script>
    (function () {
      // GitHub Pages SPA fallback:
      // Redirect unknown paths to index.html while preserving route in query.
      var l = window.location;
      var path = l.pathname.replace(/\/$/, '');
      var base = path.split('/').slice(0, 2).join('/');
      var route = path.slice(base.length) || '/';
      var target = base + '/?p=' + encodeURIComponent(route + l.search) + l.hash;
      window.location.replace(target);
    })();
  </script>
</head>
<body>
  Redirecting…
</body>
</html>
