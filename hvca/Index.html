<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>CoolTrack Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- ============================================================
       DESIGN TOKENS
  ============================================================ -->
  <style>
    :root {
      /* Colors */
      --bg:           #f0f2f5;
      --white:        #ffffff;
      --surface:      #f8f9fb;
      --border:       #e2e6ed;
      --border-strong:#d0d7e3;

      --blue:         #1a56e8;
      --blue-active:  #3b6ff0;
      --blue-tint:    #e8effe;

      --green:        #0fb77a;
      --green-tint:   #e6f9f2;

      --orange:       #f5820d;
      --orange-tint:  #fff4e6;

      --red:          #e8294a;
      --red-tint:     #fdeef1;

      --text:         #0f172a;
      --text-muted:   #334155;
      --muted:        #64748b;
      --muted-light:  #94a3b8;

      /* Typography */
      --font-display: 'Bebas Neue', sans-serif;
      --font-body:    'Outfit', sans-serif;
      --font-mono:    'JetBrains Mono', monospace;

      /* Spacing & Shape */
      --radius:       14px;
      --radius-sm:    10px;
      --shadow:       0 2px 12px rgba(0, 0, 0, .08);
      --shadow-lg:    0 8px 32px rgba(0, 0, 0, .12);
    }
  </style>

  <!-- ============================================================
       RESET & BASE
  ============================================================ -->
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      min-height: 100vh;
    }

    button { font-family: inherit; }
    textarea { resize: vertical; }
  </style>

  <!-- ============================================================
       LAYOUT
  ============================================================ -->
  <style>
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
    }

    @media (min-width: 480px) {
      #app { box-shadow: 0 0 40px rgba(0, 0, 0, .15); }
    }

    main {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
    }

    /* View transitions */
    .view { display: none; }
    .view.active {
      display: block;
      animation: fade-up .25s ease;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>

  <!-- ============================================================
       HEADER
  ============================================================ -->
  <style>
    .app-header {
      background: var(--blue);
      padding: 20px 20px 16px;
      position: sticky;
      top: 0;
      z-index: 50;
    }

    .app-header__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .app-logo {
      font-family: var(--font-display);
      font-size: 28px;
      letter-spacing: 2px;
      color: #fff;
    }
    .app-logo__sub {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 300;
      color: rgba(255, 255, 255, .5);
      letter-spacing: 0;
    }

    .app-header__date {
      font-family: var(--font-mono);
      font-size: 11px;
      color: rgba(255, 255, 255, .6);
    }

    .header-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .stat-pill {
      background: rgba(255, 255, 255, .12);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      text-align: center;
    }
    .stat-pill__value {
      font-family: var(--font-display);
      font-size: 26px;
      color: #fff;
      line-height: 1;
    }
    .stat-pill__label {
      font-size: 10px;
      color: rgba(255, 255, 255, .65);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
  </style>

  <!-- ============================================================
       BOTTOM NAV
  ============================================================ -->
  <style>
    .app-nav {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: sticky;
      top: 0;
      z-index: 49;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 4px 8px;
      gap: 4px;
      border: none;
      background: transparent;
      cursor: pointer;
      font-size: 9px;
      font-weight: 600;
      color: var(--muted-light);
      text-transform: uppercase;
      letter-spacing: .4px;
      transition: color .2s;
      position: relative;
    }

    .nav-btn__icon {
      font-size: 20px;
      transition: transform .2s;
    }
    .nav-btn:hover .nav-btn__icon { transform: translateY(-2px); }

    .nav-btn.is-active { color: var(--blue); }
    .nav-btn.is-active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 20%;
      right: 20%;
      height: 2px;
      background: var(--blue);
      border-radius: 2px;
    }

    .nav-btn__badge {
      display: none;
      position: absolute;
      top: 6px;
      right: calc(50% - 18px);
      width: 16px;
      height: 16px;
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      border-radius: 50%;
      align-items: center;
      justify-content: center;
    }
    .nav-btn__badge.is-visible { display: flex; }
  </style>

  <!-- ============================================================
       TYPOGRAPHY HELPERS
  ============================================================ -->
  <style>
    .section-title {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 1px;
      color: var(--text);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-title--sm { font-size: 17px; }

    .page-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .page-toolbar__actions { display: flex; gap: 8px; }
  </style>

  <!-- ============================================================
       CARD
  ============================================================ -->
  <style>
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 12px;
    }
  </style>

  <!-- ============================================================
       EQUIPMENT CARD
  ============================================================ -->
  <style>
    .equip-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform .15s, box-shadow .15s;
      border-left: 4px solid var(--border-strong);
    }
    .equip-card:active { transform: scale(.98); }

    .equip-card--ok     { border-left-color: var(--green); }
    .equip-card--warn   { border-left-color: var(--orange); }
    .equip-card--danger { border-left-color: var(--red); }

    .equip-card__icon {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }
    .equip-card--ok     .equip-card__icon { background: var(--green-tint); }
    .equip-card--warn   .equip-card__icon { background: var(--orange-tint); }
    .equip-card--danger .equip-card__icon { background: var(--red-tint); }

    .equip-card__body  { flex: 1; min-width: 0; }
    .equip-card__name  { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .equip-card__local { font-size: 12px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }
    .equip-card__tag   { font-size: 11px; color: var(--blue); font-weight: 600; margin-top: 2px; }
    .equip-card__last  { font-size: 11px; color: var(--muted-light); margin-top: 2px; }
  </style>

  <!-- ============================================================
       BADGE
  ============================================================ -->
  <style>
    .badge {
      font-family: var(--font-mono);
      font-size: 10px;
      font-weight: 500;
      padding: 3px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: .4px;
      flex-shrink: 0;
    }
    .badge--ok     { background: var(--green-tint);  color: var(--green); }
    .badge--warn   { background: var(--orange-tint); color: var(--orange); }
    .badge--danger { background: var(--red-tint);    color: var(--red); }
  </style>

  <!-- ============================================================
       FORM
  ============================================================ -->
  <style>
    .form-group { margin-bottom: 14px; }
    .form-row    { display: flex; gap: 10px; }
    .form-row .form-group { flex: 1; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 6px;
    }

    .form-control {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      appearance: none;
    }
    .form-control:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(26, 86, 232, .1);
    }
    textarea.form-control { min-height: 80px; resize: vertical; }
    select.form-control option { background: #fff; }
  </style>

  <!-- ============================================================
       PHOTO UPLOAD
  ============================================================ -->
  <style>
    .photo-drop {
      border: 2px dashed var(--border-strong);
      border-radius: 12px;
      background: var(--surface);
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .photo-drop:hover {
      border-color: var(--blue);
      background: var(--blue-tint);
    }
    .photo-drop input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }
    .photo-drop__icon { font-size: 28px; margin-bottom: 6px; }
    .photo-drop__text { font-size: 13px; color: var(--muted); font-weight: 500; }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .photo-thumb {
      position: relative;
      border-radius: var(--radius-sm);
      overflow: hidden;
      aspect-ratio: 1;
      background: var(--border);
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-thumb__remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      background: rgba(0, 0, 0, .6);
      color: #fff;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>

  <!-- ============================================================
       BUTTONS
  ============================================================ -->
  <style>
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      width: 100%;
      padding: 13px 20px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 700;
      font-size: 14px;
      transition: all .15s;
    }
    .btn--primary { background: var(--blue); color: #fff; }
    .btn--primary:active { background: var(--blue-active); transform: scale(.98); }

    .btn--outline {
      background: transparent;
      color: var(--blue);
      border: 2px solid var(--blue);
    }
    .btn--danger {
      background: var(--red-tint);
      color: var(--red);
    }
    .btn--sm {
      width: auto;
      padding: 8px 14px;
      font-size: 12px;
      border-radius: 8px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .btn-group .btn { flex: 1; }
  </style>

  <!-- ============================================================
       TIMELINE
  ============================================================ -->
  <style>
    .timeline {
      position: relative;
      padding-left: 24px;
    }
    .timeline::before {
      content: '';
      position: absolute;
      left: 7px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--border);
    }

    .timeline__item {
      position: relative;
      margin-bottom: 14px;
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
    }
    .timeline__item-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .timeline__item-body { flex: 1; min-width: 0; }

    .timeline__dot {
      position: absolute;
      left: -22px;
      top: 18px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--blue);
      border: 2px solid var(--bg);
      box-shadow: 0 0 0 2px var(--blue);
    }
    .timeline__dot--warn   { background: var(--orange); box-shadow: 0 0 0 2px var(--orange); }
    .timeline__dot--danger { background: var(--red);    box-shadow: 0 0 0 2px var(--red); }

    .timeline__date  { font-family: var(--font-mono); font-size: 10px; color: var(--muted-light); margin-bottom: 4px; }
    .timeline__title { font-weight: 700; font-size: 14px; margin-bottom: 2px; }
    .timeline__equip { font-size: 12px; color: var(--blue); font-weight: 600; margin-bottom: 6px; }
    .timeline__obs   { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
    .timeline__parts { font-size: 12px; color: var(--muted); margin-top: 6px; }

    .timeline__photos { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
    .timeline__photo  {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      cursor: pointer;
      border: 2px solid var(--border);
    }

    .timeline__next {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--orange-tint);
      color: var(--orange);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      padding: 3px 8px;
      border-radius: 6px;
      margin-top: 8px;
    }

    .timeline__delete {
      background: none;
      border: none;
      color: var(--muted-light);
      font-size: 16px;
      cursor: pointer;
      padding: 4px;
      flex-shrink: 0;
      margin-left: 8px;
    }
  </style>

  <!-- ============================================================
       ALERT CARD
  ============================================================ -->
  <style>
    .alert-card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      margin-bottom: 10px;
      border-left: 4px solid var(--orange);
      display: flex;
      gap: 12px;
      align-items: flex-start;
      cursor: pointer;
    }
    .alert-card--critical { border-left-color: var(--red); }

    .alert-card__icon  { font-size: 22px; flex-shrink: 0; }
    .alert-card__title { font-weight: 700; font-size: 14px; }
    .alert-card__sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .alert-card__equip {
      font-size: 11px;
      color: var(--blue);
      font-weight: 600;
      margin-top: 4px;
      font-family: var(--font-mono);
    }
  </style>

  <!-- ============================================================
       MODAL (bottom sheet)
  ============================================================ -->
  <style>
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(0, 0, 0, .5);
      backdrop-filter: blur(4px);
      align-items: flex-end;
      justify-content: center;
    }
    .modal-overlay.is-open {
      display: flex;
      animation: fade-in .2s;
    }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    .modal {
      background: var(--white);
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      animation: slide-up .25s ease;
    }
    @keyframes slide-up {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal__handle {
      width: 40px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    .modal__title {
      font-family: var(--font-display);
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 18px;
    }
  </style>

  <!-- ============================================================
       SEARCH BAR
  ============================================================ -->
  <style>
    .search-bar {
      position: relative;
      margin-bottom: 14px;
    }
    .search-bar__input { padding-left: 38px !important; }
    .search-bar__icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted-light);
      font-size: 16px;
      pointer-events: none;
    }
  </style>

  <!-- ============================================================
       DETAIL INFO ROWS (modal)
  ============================================================ -->
  <style>
    .info-list { margin-bottom: 14px; }
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row__label { color: var(--muted); font-size: 12px; }
    .info-row__value { font-weight: 600; text-align: right; max-width: 60%; }
  </style>

  <!-- ============================================================
       EMPTY STATE
  ============================================================ -->
  <style>
    .empty-state {
      text-align: center;
      padding: 40px 20px;
    }
    .empty-state__icon { font-size: 36px; margin-bottom: 10px; opacity: .5; }
    .empty-state__title { font-weight: 700; font-size: 15px; color: var(--muted); }
    .empty-state__sub   { font-size: 12px; color: var(--muted-light); margin-top: 4px; }
  </style>

  <!-- ============================================================
       LIGHTBOX
  ============================================================ -->
  <style>
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: rgba(0, 0, 0, .9);
      align-items: center;
      justify-content: center;
    }
    .lightbox.is-open { display: flex; }
    .lightbox__img { max-width: 95vw; max-height: 90vh; border-radius: 8px; object-fit: contain; }
    .lightbox__close {
      position: absolute;
      top: 16px;
      right: 20px;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
      border: none;
      background: none;
    }
  </style>

  <!-- ============================================================
       REPORT VIEW
  ============================================================ -->
  <style>
    .report-header {
      font-family: var(--font-display);
      font-size: 20px;
      letter-spacing: 1px;
      border-bottom: 2px solid var(--border);
      padding-bottom: 10px;
      margin-bottom: 10px;
    }
    .report-meta {
      font-size: 12px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .report-record { page-break-inside: avoid; }
    .report-record__obs {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      background: var(--surface);
      border-radius: 8px;
      padding: 10px;
    }
    .report-record__photos { margin-top: 10px; }
    .report-record__photos-title {
      font-size: 11px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 6px;
    }
    .report-record__photos-grid { display: flex; gap: 6px; flex-wrap: wrap; }
    .report-record__photo {
      width: 80px;
      height: 80px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid var(--border);
    }
    .report-next {
      display: inline-flex;
      background: var(--orange-tint);
      color: var(--orange);
      font-size: 11px;
      font-weight: 600;
      font-family: var(--font-mono);
      padding: 3px 8px;
      border-radius: 6px;
      margin-top: 8px;
    }
  </style>

  <!-- ============================================================
       PRINT
  ============================================================ -->
  <style>
    @media print {
      .app-header,
      .app-nav,
      .page-toolbar,
      .btn-group,
      .modal-overlay { display: none !important; }

      body { background: #fff; }
      #app { max-width: 100%; box-shadow: none; }
      main { padding: 0; }

      .view { display: none !important; }
      #view-relatorio { display: block !important; }
    }
  </style>
</head>

<!-- ============================================================
     HTML
============================================================ -->
<body>
<div id="app">

  <!-- Header -->
  <header class="app-header">
    <div class="app-header__top">
      <div class="app-logo">CoolTrack <span class="app-logo__sub">Pro</span></div>
      <div class="app-header__date" id="hdr-date"></div>
    </div>
    <div class="header-stats">
      <div class="stat-pill">
        <div class="stat-pill__value" id="hst-total">0</div>
        <div class="stat-pill__label">Equipamentos</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill__value" id="hst-mes">0</div>
        <div class="stat-pill__label">Este mês</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill__value" id="hst-alert">0</div>
        <div class="stat-pill__label">Alertas</div>
      </div>
    </div>
  </header>

  <!-- Bottom Nav -->
  <nav class="app-nav">
    <button class="nav-btn is-active" id="nav-inicio"       onclick="goView('inicio')">
      <span class="nav-btn__icon">🏠</span>Início
    </button>
    <button class="nav-btn" id="nav-equipamentos"           onclick="goView('equipamentos')">
      <span class="nav-btn__icon">❄️</span>Equip.
    </button>
    <button class="nav-btn" id="nav-registro"               onclick="goView('registro')">
      <span class="nav-btn__icon">➕</span>Registrar
    </button>
    <button class="nav-btn" id="nav-historico"              onclick="goView('historico')">
      <span class="nav-btn__icon">📋</span>Histórico
    </button>
    <button class="nav-btn" id="nav-alertas"                onclick="goView('alertas')">
      <span class="nav-btn__icon">🔔</span>Alertas
      <span class="nav-btn__badge" id="alerta-badge">0</span>
    </button>
  </nav>

  <main>

    <!-- ── INÍCIO ── -->
    <div class="view active" id="view-inicio">
      <div class="section-title">👋 Bom dia!</div>
      <div id="dash-alertas-mini"></div>

      <div class="section-title section-title--sm">Últimas manutenções</div>
      <div id="dash-recentes"></div>

      <div class="section-title section-title--sm">Equipamentos críticos</div>
      <div id="dash-criticos"></div>
    </div>

    <!-- ── EQUIPAMENTOS ── -->
    <div class="view" id="view-equipamentos">
      <div class="page-toolbar">
        <div class="section-title" style="margin:0">❄️ Equipamentos</div>
        <button class="btn btn--primary btn--sm" onclick="openModal('modal-add-eq')">+ Adicionar</button>
      </div>
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input class="form-control search-bar__input" type="text" placeholder="Buscar equipamento..." oninput="renderEquip(this.value)">
      </div>
      <div id="lista-equip"></div>
    </div>

    <!-- ── NOVO REGISTRO ── -->
    <div class="view" id="view-registro">
      <div class="section-title">✏️ Novo Registro</div>
      <div class="card">

        <div class="form-group">
          <label class="form-label">Equipamento *</label>
          <select id="r-equip" class="form-control">
            <option value="">Selecione...</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Data e Hora *</label>
          <input id="r-data" class="form-control" type="datetime-local">
        </div>

        <div class="form-group">
          <label class="form-label">Tipo de Serviço *</label>
          <select id="r-tipo" class="form-control">
            <option value="">Selecione...</option>
            <option>Manutenção Preventiva</option>
            <option>Manutenção Corretiva</option>
            <option>Limpeza de Filtros</option>
            <option>Carga de Gás Refrigerante</option>
            <option>Troca de Compressor</option>
            <option>Troca de Capacitor</option>
            <option>Limpeza de Condensador</option>
            <option>Limpeza de Evaporador</option>
            <option>Verificação Elétrica</option>
            <option>Ajuste de Dreno</option>
            <option>Inspeção Geral</option>
            <option>Outro</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label">Peças / Materiais utilizados</label>
          <input id="r-pecas" class="form-control" type="text" placeholder="Ex: Filtro G4, R-410A 1kg, Capacitor 30µF">
        </div>

        <div class="form-group">
          <label class="form-label">Observações / Serviço Realizado *</label>
          <textarea id="r-obs" class="form-control" placeholder="Descreva o que foi feito, valores medidos, condições encontradas..."></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">Fotos do Serviço</label>
          <div class="photo-drop">
            <input type="file" accept="image/*" multiple onchange="Photos.add(this)">
            <div class="photo-drop__icon">📷</div>
            <div class="photo-drop__text">Toque para adicionar fotos</div>
          </div>
          <div class="photo-grid" id="photo-preview"></div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Próxima Manutenção Prevista</label>
            <input id="r-proxima" class="form-control" type="date">
          </div>
          <div class="form-group">
            <label class="form-label">Status do Equipamento</label>
            <select id="r-status" class="form-control">
              <option value="ok">✅ Operando Normal</option>
              <option value="warn">⚠️ Requer Atenção</option>
              <option value="danger">🔴 Fora de Operação</option>
            </select>
          </div>
        </div>

        <div class="btn-group">
          <button class="btn btn--outline" onclick="Registro.clear()">Limpar</button>
          <button class="btn btn--primary" onclick="Registro.save()">💾 Salvar</button>
        </div>
      </div>
    </div>

    <!-- ── HISTÓRICO ── -->
    <div class="view" id="view-historico">
      <div class="page-toolbar">
        <div class="section-title" style="margin:0">📋 Histórico</div>
        <button class="btn btn--outline btn--sm" onclick="goView('relatorio')">📄 Relatório</button>
      </div>
      <div class="search-bar">
        <span class="search-bar__icon">🔍</span>
        <input class="form-control search-bar__input" id="hist-busca" type="text" placeholder="Buscar no histórico..." oninput="renderHist()">
      </div>
      <div class="form-group">
        <select id="hist-equip" class="form-control" onchange="renderHist()">
          <option value="">Todos os equipamentos</option>
        </select>
      </div>
      <div id="timeline"></div>
    </div>

    <!-- ── ALERTAS ── -->
    <div class="view" id="view-alertas">
      <div class="section-title">🔔 Alertas</div>
      <div id="lista-alertas"></div>
    </div>

    <!-- ── RELATÓRIO ── -->
    <div class="view" id="view-relatorio">
      <div class="page-toolbar">
        <div class="section-title" style="margin:0">📄 Relatório</div>
        <div class="page-toolbar__actions">
          <button class="btn btn--outline btn--sm" onclick="goView('historico')">← Voltar</button>
          <button class="btn btn--primary btn--sm" id="print-btn" onclick="window.print()">🖨️ Imprimir</button>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Equipamento</label>
        <select id="rel-equip" class="form-control" onchange="renderRelatorio()">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">De</label>
          <input id="rel-de" class="form-control" type="date" onchange="renderRelatorio()">
        </div>
        <div class="form-group">
          <label class="form-label">Até</label>
          <input id="rel-ate" class="form-control" type="date" onchange="renderRelatorio()">
        </div>
      </div>
      <div id="relatorio-corpo"></div>
    </div>

  </main>
</div><!-- /#app -->

<!-- Modal: Adicionar Equipamento -->
<div class="modal-overlay" id="modal-add-eq">
  <div class="modal">
    <div class="modal__handle"></div>
    <div class="modal__title">Novo Equipamento</div>

    <div class="form-group">
      <label class="form-label">Nome *</label>
      <input id="eq-nome" class="form-control" type="text" placeholder="Ex: Split UTI Adulto">
    </div>
    <div class="form-group">
      <label class="form-label">TAG / Identificação</label>
      <input id="eq-tag" class="form-control" type="text" placeholder="Ex: AC-UTI-01">
    </div>
    <div class="form-group">
      <label class="form-label">Localização *</label>
      <input id="eq-local" class="form-control" type="text" placeholder="Ex: UTI Adulto – 2º Andar">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select id="eq-tipo" class="form-control">
          <option>Split Hi-Wall</option>
          <option>Split Cassete</option>
          <option>Split Piso Teto</option>
          <option>VRF / VRV</option>
          <option>Chiller</option>
          <option>Fan Coil</option>
          <option>Self Contained</option>
          <option>Roof Top</option>
          <option>Câmara Fria</option>
          <option>Outro</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Fluido Refrigerante</label>
        <select id="eq-fluido" class="form-control">
          <option>R-410A</option>
          <option>R-22</option>
          <option>R-32</option>
          <option>R-407C</option>
          <option>R-134A</option>
          <option>Outro</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Marca / Modelo</label>
      <input id="eq-modelo" class="form-control" type="text" placeholder="Ex: Carrier 18000 BTU">
    </div>
    <div class="btn-group">
      <button class="btn btn--outline" onclick="Modal.close('modal-add-eq')">Cancelar</button>
      <button class="btn btn--primary" onclick="Equipamentos.save()">✅ Salvar</button>
    </div>
  </div>
</div>

<!-- Modal: Detalhe Equipamento -->
<div class="modal-overlay" id="modal-eq-det">
  <div class="modal">
    <div class="modal__handle"></div>
    <div id="eq-det-corpo"></div>
  </div>
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="Photos.closeLightbox()">
  <button class="lightbox__close" onclick="Photos.closeLightbox()">✕</button>
  <img class="lightbox__img" id="lightbox-img" src="" alt="Foto do serviço">
</div>

<!-- ============================================================
     JAVASCRIPT
============================================================ -->
<script type="module" src="./js/app.js"></script>

</body>
</html>
